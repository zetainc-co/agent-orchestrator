name: Build SebasAgent Web Image

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/build-web-branded.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: zetainnovation/sebasagent-web

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:1.13.0-branded
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
